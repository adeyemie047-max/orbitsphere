# OrbitSphere — Supabase project configuration
# Link your project: npx supabase link --project-ref YOUR_PROJECT_REF
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "orbitsphere"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://orbitsphere-blue.vercel.app"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
